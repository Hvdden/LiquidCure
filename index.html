<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIQUID CURE // OBSIDIAN FLOW</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0a;
            --text: #fff;
            --accent: #ff3e3e; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --font-logo: 'UnifrakturMaguntia', serif;
        }

        @keyframes cartShake {
            0% { transform: scale(1); }
            25% { transform: scale(1.2) rotate(5deg); }
            50% { transform: scale(1.2) rotate(-5deg); }
            100% { transform: scale(1); }
        }

        .cart-active { animation: cartShake 0.4s ease; }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
        }

        #liquid-surface {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            filter: blur(20px) contrast(25); 
            pointer-events: none;
            opacity: 0.7;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            position: fixed;
            width: 100%;
            top: 0; 
            z-index: 2000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        nav h1 {
            font-family: var(--font-logo);
            font-size: 3rem;
            font-weight: 400;
            text-transform: lowercase;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            letter-spacing: -2px;
        }

        .logo img { height: 25px; filter: invert(1); }

        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero-bg-text {
            position: absolute;
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 12px;
            letter-spacing: 15px;
            border: 1px solid var(--accent);
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 62, 62, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px 20px;
            position: relative;
            z-index: 10;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .product-card { 
            position: relative; 
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
        }

        .img-wrap {
            background: #000;
            margin-bottom: 20px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.8);
            transition: 0.6s ease;
        }

        .product-card:hover .img-wrap img { 
            filter: grayscale(0) brightness(1.1); 
            transform: scale(1.1); 
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info h3 {
            font-family: var(--font-logo);
            font-size: 1.8rem;
        }

        .price {
            font-size: 14px;
            font-weight: 900;
            color: var(--accent);
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: 1px solid #333;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: none !important;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #fff;
            color: #000;
        }

        footer {
            padding: 80px;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 10px;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <canvas id="liquid-surface"></canvas>

    <nav>
        <div class="logo"><img src="images/logo.png" alt="LC"></div>
        <h1>liquid cure</h1>
        <a href="cart.html" id="cart-icon" class="cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2 -2V6l-3 -4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1 -8 0"></path>
            </svg>
        </a>
    </nav>

    <header class="hero">
        <div class="hero-bg-text">LIQUID CURE</div>
        <p>L.C. / 2026</p>
    </header>

    <main class="container">
        <div class="grid">
            <div class="product-card">
                <div class="img-wrap"><img src="images/pic1.jpg"></div>
                <div class="info">
                    <h3>Love Luxury Tee</h3>
                    <span class="price">$15.68</span>
                </div>
                <button class="add-btn" onclick="addToCart('Love Luxury Tee', 15.68, 'images/pic1.jpg')">ADD TO BAG</button>
            </div>
            <div class="product-card">
                <div class="img-wrap"><img src="images/pic2.jpg"></div>
                <div class="info">
                    <h3>Line #02 Cotton</h3>
                    <span class="price">$14.45</span>
                </div>
                <button class="add-btn" onclick="addToCart('Line #02 Cotton', 14.45, 'images/pic2.jpg')">ADD TO BAG</button>
            </div>
            <div class="product-card">
                <div class="img-wrap"><img src="images/pic3.jpg"></div>
                <div class="info">
                    <h3>Limited Liquid</h3>
                    <span class="price">$14.45</span>
                </div>
                <button class="add-btn" onclick="addToCart('Limited Liquid', 14.45, 'images/pic3.jpg')">ADD TO BAG</button>
            </div>
            <div class="product-card">
                <div class="img-wrap"><img src="images/pic4.jpg"></div>
                <div class="info">
                    <h3>Champion Luxury</h3>
                    <span class="price">$48.18</span>
                </div>
                <button class="add-btn" onclick="addToCart('Champion Luxury', 48.18, 'images/pic4.jpg')">ADD TO BAG</button>
            </div>
        </div>
    </main>

    <footer>© 2026 LIQUID CURE // ARTIST OWNED</footer>

    <script>
        const canvas = document.getElementById('liquid-surface');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const heroText = document.querySelector('.hero-bg-text');
        const cartIcon = document.getElementById('cart-icon');
        
        let width, height;
        let droplets = [];

        // CART LOGIC
        function addToCart(name, price, image) {
            let cart = JSON.parse(localStorage.getItem('liquid_cart')) || [];
            const existing = cart.find(item => item.name === name);
            
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ name, price, image, qty: 1 });
            }
            
            localStorage.setItem('liquid_cart', JSON.stringify(cart));
            
            // Visual feedback
            cartIcon.classList.add('cart-active');
            setTimeout(() => cartIcon.classList.remove('cart-active'), 400);
        }

        // VISUALS
        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            const moveX = (e.clientX - width/2) * 0.05;
            const moveY = (e.clientY - height/2) * 0.05;
            heroText.style.transform = `translate(${moveX}px, ${moveY}px)`;

            for(let i = 0; i < 3; i++) {
                droplets.push({
                    x: e.clientX,
                    y: e.clientY + window.scrollY,
                    r: Math.random() * 40 + 20,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    life: 1.0,
                    color: Math.random() > 0.8 ? "255, 62, 62" : "255, 255, 255"
                });
            }
        });

        function draw() {
            ctx.clearRect(0, 0, width, height);
            const sY = window.scrollY;

            for (let i = droplets.length - 1; i >= 0; i--) {
                let d = droplets[i];
                d.x += d.vx;
                d.y += d.vy;
                d.life -= 0.008; 
                if (d.life <= 0) { droplets.splice(i, 1); continue; }
                ctx.fillStyle = `rgba(${d.color}, ${d.life * 0.5})`; 
                ctx.beginPath();
                ctx.arc(d.x, d.y - sY, d.r * d.life, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
